<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Art Inspiration Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container glass-panel">
        <header>
            <h1>Art<span class="highlight">Sync</span></h1>
            <p>Your AI-Powered Digital Art Muse</p>
        </header>

        <main>
            <div class="top-controls">
                <input type="password" id="api-key" placeholder="Enter Gemini API Key (Required)" class="glass-input api-key-input" value="AIzaSyBYMajtCT7O2YXdRAKw1wCVfF35F7VsMfs">
                <select id="language-select" class="glass-input lang-select" title="Select Chat Language">
                    <option value="English">English</option>
                    <option value="Hindi">Hindi (हिंदी)</option>
                    <option value="Spanish">Spanish (Español)</option>
                    <option value="French">French (Français)</option>
                </select>
                <button id="clear-btn" class="glass-input clear-btn" title="Clear Chat" aria-label="Clear Chat">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px; margin: auto;"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                </button>
            </div>

            <div class="chat-container glass-panel-inner">
                <div class="chat-messages" id="chat-messages">
                    <div class="message bot-message">
                        <div class="message-content">Hello! I'm ArtSync, your AI art director. Tell me what kind of digital art you want to create, and I'll help you brainstorm and find references!</div>
                    </div>
                </div>
                <div class="typing-indicator hidden" id="typing-indicator">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                
                <div class="chat-input-area">
                    <input type="file" id="image-upload" accept="image/*" class="hidden">
                    <button id="upload-btn" class="icon-btn secondary-btn" aria-label="Upload Image" title="Upload Image for Analysis">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                    </button>
                    <div id="image-preview-container" class="hidden">
                        <img id="image-preview" src="" alt="Preview">
                        <button id="remove-image-btn" aria-label="Remove Image">×</button>
                    </div>
                    <input type="text" id="chat-input" placeholder="Type your idea or upload an art image..." class="glass-input" autocomplete="off">
                    <button id="send-btn" class="icon-btn" aria-label="Send Message">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </div>
            </div>
            <div id="error-message" class="error hidden"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
